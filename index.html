<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lumon - OS</title>
</head>
<body>

    <section id="fisrtscreensection" class="firstScreen-section">
        <img src="./assets/LumonLogo.svg" alt="">
        <div class="containerdotitulo">
            <h1 class="firstScreenTitle">LUMON</h1>
        </div>
    
        <div class="carregando">
            <span class="pontos"></span>
            <span class="pontos"></span>
            <span class="pontos"></span>
        </div>
    </section>
    
    <section id="passwordscreen" class="password-screen-Section">
        <div class="border-password-screen">
            <header class="header-password-screen">
                <img src="./assets/LumonLogo2.svg" alt="">
                <div class="headerDiv">
                    <div class="leftHeader">
                        <p>LUMON OPERATING SYSTEM</p>
                        <p>OSE 2.6.1</p>
                    </div>
                    <div class="rightHeader">
                        <p>OPTICS SYSTEMS ENVIRONMENT</p>
                        <div class="divider"></div>
                        <div class="statusdot"></div>
                    </div>
                </div>
            </header>
            
            <div class="container-passwordscreen-darker">
                <div class="container-passwordscr-grid">
                    <div>
                        <h2 class="password-screen-title">welcome<br>back</h2>
                    </div>
                    
                    <hr class="password-screen-bar">
                    
                    <div class="containerforpassword">
                        <div class="divSeparadora-Containerforpassword">
                            <p>PASSWORD</p>
                        </div>
                        <input class="typePassword" type="text">
                        <button class="submitButton" type="button">SUBMITE</button>
                    </div>
                </div>
                
                <div class="container-footer-darker">
                    <div class="container-systemstatus">
                        <div class="divider2"></div>
                        <div>
                            <h2>SYSTEM STATUS</h2>
                            <div class="divbehindgreendot">
                                <div class="greendot"></div>
                                <p>All systems operational</p>
                            </div>
                            <p>Thank you for your continued service</p>
                        </div>
                    </div>
                    <div class="container-datestatus">
                        <p>22:26</p>
                        <div class="divider3"></div>
                        <div class="container-datestatus-text">
                            <p>19 DE MAIO</p>
                            <p>2026</p>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="passwordscr-footer">
                <p>LUMON INDUSTRIES</p>

                <input type="checkbox" name="" id="toggle">
                <div class="displaycheckbox">
                    <label for="toggle">
                        <div class="circle">
                            <svg class="svgfromcheckbox sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z" />
                            </svg>
                            <svg class="svgfromcheckbox moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                                <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z" clip-rule="evenodd" />
                            </svg>
                        </div>
                    </label>
                </div>

                <P>FOR AUTHORIZED PERSONNEL ONLY</P>
            </footer>
        </div>
    </section>

    <script src="/app.js"></script>
</body>
</html>
